<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; font-family: sans-serif; height: 100vh; overflow: hidden; }

    .content-area { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    .sidebar {
      width: 320px;
      min-width: 320px;
      padding: 1.5rem;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      background: #fafafa;
    }

    .sidebar h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: row;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
    }

    .sidebar-nav__link {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      cursor: default;
      text-align: center;
    }

    .sidebar-nav__link[href] {
      cursor: pointer;
    }

    .sidebar-nav__link[href]:hover {
      background: #e8e8e8;
      color: #222;
      border-color: #bbb;
    }

    .sidebar-nav__link--active {
      background: #f0fdf4;
      color: #2db37a;
      font-weight: 600;
      border-color: #2db37a;
    }

    .recipe-name-search {
      display: block;
      width: 100%;
      padding: 0.35rem 0.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #333;
      background: #fff;
    }

    .recipe-name-search:focus {
      outline: none;
      border-color: #2db37a;
    }

    .clear-filters-btn {
      display: block;
      width: 100%;
      padding: 0.35rem 0.5rem;
      margin-bottom: 1.2rem;
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #666;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .clear-filters-btn:hover {
      background: #f0f0f0;
      color: #333;
    }

    .filter-group {
      margin-bottom: 1.2rem;
    }

    .filter-label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #444;
      margin-bottom: 0.35rem;
    }

    .filter-checkboxes {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      max-height: 180px;
      overflow-y: auto;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.1rem 0.2rem;
      border-radius: 3px;
      color: #333;
      user-select: none;
    }

    .filter-option:hover { background: #f0f0f0; }

    .filter-option--unavailable {
      color: #bbb;
    }

    .filter-option--unavailable input[type="checkbox"] {
      opacity: 0.4;
    }

    .filter-option-value {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .filter-option-count {
      font-size: 0.75rem;
      color: #999;
      flex-shrink: 0;
    }

    .filter-option--unavailable .filter-option-count {
      color: #ccc;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      padding: 2rem 2rem 1rem;
      flex-shrink: 0;
    }

    .gallery-header h1 {
      font-size: 1.5rem;
      color: #222;
    }

    .recipe-gallery-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 2rem 2rem;
    }

    #recipe-gallery-results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .infinite-scroll-sentinel {
      height: 300px;
      visibility: hidden;
      pointer-events: none;
    }

    .recipe-card {
      position: relative;
      height: 260px;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a no-repeat center/cover;
    }

    .recipe-card__overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.75rem;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 55%);
    }

    .recipe-card__bottom {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .recipe-card__logo {
      width: 46.4px;
      height: 46.4px;
      flex-shrink: 0;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
    }

    .recipe-card__info {
      flex: 1;
      min-width: 0;
    }

    .recipe-card__name {
      display: block;
      color: #fff;
      font-weight: 700;
      font-size: 1.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recipe-card__count {
      display: block;
      color: rgba(255,255,255,0.75);
      font-size: 0.75rem;
      margin-top: 0.15rem;
    }

    .no-results {
      grid-column: 1 / -1;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

{% include "_top_nav.html" with active_section="recipes" %}

<div class="content-area">

  <aside class="sidebar">
    <h2>Recipes</h2>
    <nav class="sidebar-nav">
      <a class="sidebar-nav__link sidebar-nav__link--active">Explorer</a>
      <a href="{% url 'recipes-graph' %}" class="sidebar-nav__link">Graph</a>
    </nav>
    <a href="{% url 'recipes-explorer' %}" class="clear-filters-btn">Clear all filters</a>
    <form id="recipe-filter-form"
          hx-get="{% url 'recipes-explorer' %}"
          hx-trigger="change, input delay:300ms from:#recipe-name-search"
          hx-target="#recipe-gallery-results"
          hx-push-url="true">
      <input id="recipe-name-search"
             type="search"
             name="name_search"
             class="recipe-name-search"
             placeholder="Search by name…"
             value="{{ name_search }}">
      {% include "recipes/includes/sidebar_filters.html" %}
    </form>
  </aside>

  <main class="main">
    <div class="gallery-header">
      <h1>Explorer</h1>
    </div>
    <div class="recipe-gallery-scroll">
      <div id="recipe-gallery-results" class="recipe-grid">
        {% include "recipes/includes/recipe_results.html" %}
      </div>
      <div id="recipe-load-more-sentinel">
        {% if page_obj.has_next %}
        <div class="infinite-scroll-sentinel"
             hx-get="{% url 'recipes-explorer-partial-results' %}"
             hx-include="#recipe-filter-form"
             hx-vals='{"page": "{{ page_obj.next_page_number }}"}'
             hx-trigger="intersect root:.recipe-gallery-scroll"
             hx-target="#recipe-load-more-sentinel"
             hx-swap="outerHTML">
        </div>
        {% endif %}
      </div>
    </div>
  </main>

</div><!-- .content-area -->

</body>
</html>
