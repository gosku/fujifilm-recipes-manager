<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push recipe to camera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }

    .card {
      background: white;
      border-radius: 16px;
      width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .card-header {
      background: #1e1e1e;
      padding: 1.25rem 1.5rem;
      text-align: center;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.3rem;
    }

    .recipe-name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .slot-list { padding: 0.5rem 1.5rem 1rem; }

    .slot-row {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
      padding: 0.85rem 0.5rem;
      border: none;
      border-bottom: 1px solid #f0f0f0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
      border-radius: 6px;
    }

    .slot-row:last-child { border-bottom: none; }
    .slot-row:hover { background: #f6fdf9; }

    .slot-badge {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 6px;
      background: #222;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .slot-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .slot-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .slot-film-tag {
      margin-top: 0.2rem;
      font-size: 0.68rem;
      font-weight: 500;
      color: #2db37a;
      background: #eaf7f0;
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      letter-spacing: 0.02em;
    }

    .slot-chevron {
      color: #ccc;
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <p class="card-title">Push to camera</p>
      <p class="recipe-name">{{ recipe.name }}</p>
    </div>

    <div class="slot-list">
      {% for slot in slots %}
      <form method="post" action="{% url 'push-recipe-to-camera' recipe_id=recipe.id slot=slot.label %}">
        {% csrf_token %}
        <button type="submit" class="slot-row">
          <span class="slot-badge">{{ slot.label }}</span>
          <span class="slot-info">
            <span class="slot-name">{{ slot.name|default:"—" }}</span>
            {% if slot.film_sim %}<span class="slot-film-tag">{{ slot.film_sim }}</span>{% endif %}
          </span>
          <span class="slot-chevron">›</span>
        </button>
      </form>
      {% endfor %}
    </div>
  </div>
</body>
</html>
