<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Network</title>
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; font-family: sans-serif; height: 100vh; overflow: hidden; }

    .content-area { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    .sidebar {
      width: 320px;
      min-width: 320px;
      padding: 1.5rem;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      background: #fafafa;
    }

    .sidebar h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .sidebar-nav {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
    }

    .sidebar-nav__link {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      cursor: default;
    }

    .sidebar-nav__link[href] { cursor: pointer; }
    .sidebar-nav__link[href]:hover { background: #f0f0f0; color: #222; }
    .sidebar-nav__link--active { background: #f0fdf4; color: #2db37a; font-weight: 600; }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .section-header h1 { font-size: 1rem; font-weight: 600; color: #222; }

    .graph-hint {
      font-size: 0.78rem;
      color: #999;
      margin-left: auto;
    }

    #cy { flex: 1; background: #f5f5f5; }

    /* Floating film-sim filter */
    .film-sim-filter {
      position: absolute;
      top: 4rem;
      left: 1.25rem;
      z-index: 10;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 180px;
    }

    .film-sim-filter label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
    }

    .film-sim-filter select {
      font-size: 0.85rem;
      color: #222;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      background: #fafafa;
      cursor: pointer;
      width: 100%;
    }

    .film-sim-filter select:focus { outline: 2px solid #2db37a; outline-offset: 1px; }

    /* --- Recipe info card --- */
    .recipe-card {
      position: absolute;
      top: 3.5rem;
      right: 1rem;
      z-index: 20;
      width: 390px;
      max-height: calc(100vh - 8rem);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      font-size: 0.8rem;
      color: #333;
    }

    .recipe-card__section {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .recipe-card__section:last-child { border-bottom: none; }

    .recipe-card__title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      margin-bottom: 0.5rem;
    }

    .recipe-card__name {
      font-weight: 600;
      color: #222;
      margin-bottom: 0.45rem;
      font-size: 0.88rem;
    }

    .recipe-card__fields {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .recipe-card__fields--two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.15rem 0.5rem;
      font-size: 0.73rem;
    }

    .recipe-card__field {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      min-width: 0;
    }

    .recipe-card__field-name { color: #888; flex-shrink: 0; }
    .recipe-card__field-value { font-weight: 500; color: #222; text-align: right; }
    .recipe-card__field-transition {
      font-weight: 500;
      color: #222;
      text-align: right;
      white-space: nowrap;
    }

    .recipe-card__delta-node {
      margin-bottom: 0.55rem;
    }

    .recipe-card__delta-node:last-child { margin-bottom: 0; }

    .recipe-card__delta-label {
      font-weight: 600;
      color: #444;
      margin-bottom: 0.2rem;
      font-size: 0.78rem;
    }

    .recipe-card__name-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .recipe-card__name-row .recipe-card__name { margin-bottom: 0; flex: 1; }

    .recipe-card__btn {
      flex-shrink: 0;
      padding: 0.3rem 0.6rem;
      background: #2db37a;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }

    .recipe-card__btn:hover { background: #22956a; }

    .recipe-card__loading {
      color: #aaa;
      font-style: italic;
      font-size: 0.78rem;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      z-index: 100;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      pointer-events: none;
      display: none;
      max-width: 220px;
    }

    .tooltip-label { font-weight: 700; font-size: 0.9rem; color: #222; margin-bottom: 0.2rem; }
    .tooltip-meta { font-size: 0.78rem; color: #777; line-height: 1.5; }
  </style>
</head>
<body>

{% include "_top_nav.html" with active_section="recipes" %}

<div class="content-area">

  <aside class="sidebar">
    <h2>Recipes</h2>
    <nav class="sidebar-nav">
      <a href="{% url 'recipes-explorer' %}" class="sidebar-nav__link">Explorer</a>
      <a class="sidebar-nav__link sidebar-nav__link--active">Graph</a>
    </nav>
  </aside>

  <main class="main">
    <div class="section-header">
      <h1>Recipe Network</h1>
      <span class="graph-hint">Root = most-used recipe &mdash; click a node to inspect it</span>
    </div>

    <div id="cy"></div>

    <div class="film-sim-filter">
      <label for="film-sim-select">Film Simulation</label>
      <select id="film-sim-select">
        {% for sim in film_simulations %}
        <option value="{{ sim }}"{% if sim == active_film_simulation %} selected{% endif %}>{{ sim }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="recipe-card" id="recipe-card">
      <div class="recipe-card__section" id="card-root-section">
        <div class="recipe-card__title">Recipe of Reference</div>
        <div class="recipe-card__name" id="card-root-name"></div>
        <div class="recipe-card__fields recipe-card__fields--two-col" id="card-root-fields"></div>
      </div>
      <div id="card-selected-section" style="display:none">
        <div class="recipe-card__section">
          <div class="recipe-card__title">Compare with Recipe</div>
          <div class="recipe-card__name-row">
            <div class="recipe-card__name" id="card-selected-name"></div>
            <button class="recipe-card__btn" id="card-show-graph-btn">Go to this recipe graph</button>
          </div>
          <div class="recipe-card__title" style="margin-top:0.6rem">Differences</div>
          <div class="recipe-card__fields" id="card-root-diffs"></div>
        </div>
        <div class="recipe-card__section" id="card-delta-section" style="display:none">
          <div class="recipe-card__title">Delta Breakdown</div>
          <div id="card-delta-nodes"></div>
        </div>
      </div>
    </div>
  </main>

</div><!-- .content-area -->

<div id="tooltip">
  <div class="tooltip-label" id="tooltip-label"></div>
  <div class="tooltip-meta" id="tooltip-meta"></div>
</div>

<script id="init-data" type="application/json">
  {
    "active_film_sim": "{{ active_film_simulation|escapejs }}",
    "root_id": {% if root_id %}{{ root_id }}{% else %}null{% endif %}
  }
</script>
<script>
  var _initData    = JSON.parse(document.getElementById("init-data").textContent);
  var INITIAL_ELEMENTS = {{ graph_elements_json|safe }};
  var ACTIVE_FILM_SIM  = _initData.active_film_sim;
  var ROOT_ID          = _initData.root_id;
  var ROOT_LABEL       = "{{ root_label|escapejs }}";
  var ROOT_FIELDS      = {{ root_fields_json|safe }};

  var NODE_COLOR        = "#3b82f6";
  var NODE_BORDER_COLOR = "#1d4ed8";
  var ROOT_COLOR        = "#f97316";
  var ROOT_BORDER_COLOR = "#c2410c";

  var MIN_NODE_SIZE = 14;
  var MAX_NODE_SIZE = 80;

  function maxImageCount(elements) {
    var counts = elements
      .filter(function (el) { return el.data && !el.data.source; })
      .map(function (el) { return el.data.image_count || 0; });
    return Math.max.apply(null, counts.concat([1]));
  }

  function sizeForImageCount(count, maxImages) {
    var t = count / maxImages;
    return MIN_NODE_SIZE + t * (MAX_NODE_SIZE - MIN_NODE_SIZE);
  }

  var RING_SPACING = 45;
  var RING_OFFSET  = 60;

  function buildRadialPositions(elements, rootId) {
    var rootStr = String(rootId);
    var nodeDistance = {};
    var children = {};

    elements.forEach(function (el) {
      if (el.data && el.data.source === undefined) {
        var id = String(el.data.id);
        nodeDistance[id] = el.data.distance || 0;
        children[id] = [];
      }
    });
    elements.forEach(function (el) {
      if (el.data && el.data.source !== undefined) {
        var src = String(el.data.source);
        var tgt = String(el.data.target);
        if (children[src]) children[src].push(tgt);
      }
    });

    var leafCount = {};
    function countLeaves(id) {
      if (leafCount[id] !== undefined) return leafCount[id];
      var kids = children[id] || [];
      if (kids.length === 0) { leafCount[id] = 1; return 1; }
      var total = 0;
      kids.forEach(function (c) { total += countLeaves(c); });
      leafCount[id] = total;
      return total;
    }
    countLeaves(rootStr);

    var positions = {};
    function place(id, startAngle, endAngle) {
      var angle = (startAngle + endAngle) / 2;
      var r = (nodeDistance[id] || 0) * RING_SPACING + (nodeDistance[id] ? RING_OFFSET : 0);
      positions[id] = { x: r * Math.cos(angle), y: r * Math.sin(angle) };
      var kids = children[id] || [];
      var cursor = startAngle;
      kids.forEach(function (kid) {
        var end = cursor + (leafCount[kid] / leafCount[id]) * (endAngle - startAngle);
        place(kid, cursor, end);
        cursor = end;
      });
    }
    place(rootStr, 0, 2 * Math.PI);
    return positions;
  }

  function makePresetLayout(positions, onStop) {
    return {
      name: "preset",
      positions: function (node) { return positions[node.data("id")]; },
      fit: true,
      padding: 60,
      animate: true,
      animationDuration: 600,
      stop: onStop || function () {},
    };
  }

  var EDGE_STYLES = [
    {
      selector: "edge[distance = 1]",
      style: {
        "line-color": "#1e293b",
        "line-style": "solid",
        "opacity": 0.75,
        "width": 1.5,
      }
    },
    {
      selector: "edge[distance > 1]",
      style: {
        "line-color": "#94a3b8",
        "line-style": "solid",
        "opacity": 0.45,
        "width": 1,
        "label": "data(distanceLabel)",
        "font-size": 9,
        "color": "#94a3b8",
        "text-background-color": "#f5f5f5",
        "text-background-opacity": 1,
        "text-background-padding": "2px",
      }
    },
  ];

  var cy = cytoscape({
    container: document.getElementById("cy"),
    elements: INITIAL_ELEMENTS,
    wheelSensitivity: 0.15,
    style: [
      {
        selector: "node",
        style: {
          "label": "data(label)",
          "text-valign": "bottom",
          "text-margin-y": 4,
          "font-size": 11,
          "color": "#555",
          "text-outline-color": "#f5f5f5",
          "text-outline-width": 2,
          "border-width": 1.5,
          "background-color": NODE_COLOR,
          "border-color": NODE_BORDER_COLOR,
          "width": MIN_NODE_SIZE,
          "height": MIN_NODE_SIZE,
        }
      },
      {
        selector: "edge",
        style: { "width": 1, "line-color": "#94a3b8", "line-style": "solid", "curve-style": "bezier", "opacity": 0.45 }
      },
    ].concat(EDGE_STYLES).concat([
      {
        selector: "node:selected",
        style: { "border-width": 3, "border-color": "#111" }
      }
    ]),
    layout: makePresetLayout(buildRadialPositions(INITIAL_ELEMENTS, ROOT_ID), applyRadialLabels),
  });

  function applyRadialLabels() {
    var centre = cy.getElementById(String(ROOT_ID)).position();
    cy.nodes().forEach(function (node) {
      var pos = node.position();
      var dx = pos.x - centre.x;
      var dy = pos.y - centre.y;
      var len = Math.sqrt(dx * dx + dy * dy);
      if (len < 1) {
        node.style({ "text-valign": "bottom", "text-halign": "center", "text-margin-x": 0, "text-margin-y": 4 });
        return;
      }
      var cos = dx / len;
      var sin = dy / len;
      var halign = Math.abs(cos) < 0.4 ? "center" : (cos > 0 ? "right" : "left");
      var valign = Math.abs(sin) < 0.4 ? "center" : (sin > 0 ? "bottom" : "top");
      var GAP = 6;
      node.style({
        "text-valign": valign,
        "text-halign": halign,
        "text-margin-x": Math.abs(cos) >= 0.4 ? cos * GAP : 0,
        "text-margin-y": Math.abs(sin) >= 0.4 ? sin * GAP : 0,
      });
    });
  }

  function applyNodeStyles(elements, rootId) {
    var maxImages = maxImageCount(elements);
    cy.nodes().forEach(function (node) {
      var isRoot = rootId !== null && node.data("id") === String(rootId);
      var size = sizeForImageCount(node.data("image_count") || 0, maxImages);
      node.style({
        "background-color": isRoot ? ROOT_COLOR : NODE_COLOR,
        "border-color":     isRoot ? ROOT_BORDER_COLOR : NODE_BORDER_COLOR,
        "width":  isRoot ? Math.max(size, 32) : size,
        "height": isRoot ? Math.max(size, 32) : size,
      });
    });
  }

  applyNodeStyles(INITIAL_ELEMENTS, ROOT_ID);

  // --- Recipe card ---

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderFields(containerEl, fields) {
    containerEl.innerHTML = "";
    fields.forEach(function (f) {
      var row = document.createElement("div");
      row.className = "recipe-card__field";
      var valueHtml = f.before != null
        ? '<span class="recipe-card__field-transition">' +
            escapeHtml(f.before) + ' &rarr; ' + escapeHtml(f.value) +
          '</span>'
        : '<span class="recipe-card__field-value">' + escapeHtml(f.value) + '</span>';
      row.innerHTML =
        '<span class="recipe-card__field-name">' + escapeHtml(f.field) + '</span>' +
        valueHtml;
      containerEl.appendChild(row);
    });
  }

  function populateRootCard(label, fields) {
    document.getElementById("card-root-name").textContent = label;
    renderFields(document.getElementById("card-root-fields"), fields);
  }

  function showSelectedSection(selectedLabel, rootDiffs, pathNodes) {
    document.getElementById("card-selected-name").textContent = selectedLabel;

    var diffsEl = document.getElementById("card-root-diffs");
    if (rootDiffs.length === 0) {
      diffsEl.innerHTML = '<em style="color:#aaa;font-size:0.78rem">No differences</em>';
    } else {
      renderFields(diffsEl, rootDiffs);
    }

    var nonRootNodes = pathNodes.slice(1);
    var cardDeltaSection = document.getElementById("card-delta-section");
    if (nonRootNodes.length <= 1) {
      cardDeltaSection.style.display = "none";
    } else {
      var deltaContainer = document.getElementById("card-delta-nodes");
      deltaContainer.innerHTML = "";
      nonRootNodes.forEach(function (node) {
        var nodeEl = document.createElement("div");
        nodeEl.className = "recipe-card__delta-node";
        var labelEl = document.createElement("div");
        labelEl.className = "recipe-card__delta-label";
        labelEl.textContent = node.label;
        nodeEl.appendChild(labelEl);
        var fieldsEl = document.createElement("div");
        fieldsEl.className = "recipe-card__fields";
        renderFields(fieldsEl, node.fields);
        nodeEl.appendChild(fieldsEl);
        deltaContainer.appendChild(nodeEl);
      });
      cardDeltaSection.style.display = "";
    }

    document.getElementById("card-selected-section").style.display = "";
  }

  function hideSelectedSection() {
    document.getElementById("card-selected-section").style.display = "none";
  }

  populateRootCard(ROOT_LABEL, ROOT_FIELDS);

  // BFS path from rootId to targetId using graph edges
  function findPath(rootId, targetId) {
    var rootStr = String(rootId);
    var targetStr = String(targetId);
    if (rootStr === targetStr) return [rootStr];
    var parent = {};
    var visited = new Set([rootStr]);
    var queue = [rootStr];
    while (queue.length > 0) {
      var current = queue.shift();
      var neighbours = cy.getElementById(current).connectedEdges().map(function (edge) {
        return edge.data("source") === current ? edge.data("target") : edge.data("source");
      });
      for (var i = 0; i < neighbours.length; i++) {
        var nb = neighbours[i];
        if (!visited.has(nb)) {
          visited.add(nb);
          parent[nb] = current;
          if (nb === targetStr) {
            var path = [];
            var node = targetStr;
            while (node !== undefined) {
              path.unshift(node);
              node = parent[node];
            }
            return path;
          }
          queue.push(nb);
        }
      }
    }
    return [rootStr, targetStr];
  }

  var _pathEdges = [];

  function resetEdgeStyle(edge) {
    var d = edge.data("distance");
    if (d === 1) {
      edge.style({ "line-color": "#1e293b", "width": 1.5, "opacity": 0.75 });
    } else {
      edge.style({ "line-color": "#94a3b8", "width": 1, "opacity": 0.45 });
    }
  }

  function clearPathHighlight() {
    _pathEdges.forEach(function (edge) { resetEdgeStyle(edge); });
    _pathEdges = [];
  }

  function highlightPath(path) {
    clearPathHighlight();
    for (var i = 0; i < path.length - 1; i++) {
      cy.getElementById(path[i]).edgesWith(cy.getElementById(path[i + 1])).forEach(function (edge) {
        edge.style({ "line-color": "#22c55e", "width": 3, "opacity": 1 });
        _pathEdges.push(edge);
      });
    }
  }

  // Tooltip
  var tooltip     = document.getElementById("tooltip");
  var tooltipLabel = document.getElementById("tooltip-label");
  var tooltipMeta  = document.getElementById("tooltip-meta");

  cy.on("mouseover", "node", function (e) {
    var node = e.target;
    tooltipLabel.textContent = node.data("label");
    var isRoot = ROOT_ID !== null && node.data("id") === String(ROOT_ID);
    tooltipMeta.innerHTML =
      (node.data("image_count") || 0) + " image" + (node.data("image_count") === 1 ? "" : "s") +
      (isRoot ? "<br><em>reference recipe</em>" : "");
    tooltip.style.display = "block";
  });

  cy.on("mousemove", "node", function (e) {
    tooltip.style.left = (e.originalEvent.clientX + 14) + "px";
    tooltip.style.top  = (e.originalEvent.clientY + 14) + "px";
  });

  cy.on("mouseout", "node", function () { tooltip.style.display = "none"; });

  cy.on("click", "node", function (e) {
    var nodeId = e.target.data("id");
    if (ROOT_ID !== null && nodeId === String(ROOT_ID)) {
      hideSelectedSection();
      clearPathHighlight();
      return;
    }
    var selectedLabel = e.target.data("label");
    var path = findPath(ROOT_ID, nodeId);
    highlightPath(path);

    document.getElementById("card-selected-name").textContent = selectedLabel;
    document.getElementById("card-root-diffs").innerHTML =
      '<span class="recipe-card__loading">Loading…</span>';
    document.getElementById("card-delta-section").style.display = "none";
    document.getElementById("card-selected-section").style.display = "";

    document.getElementById("card-show-graph-btn").onclick = function () {
      window.location.href = "/recipes/graph/" + nodeId + "/";
    };

    fetch("/recipes/path-deltas/?ids=" + path.join(","))
      .then(function (res) { return res.json(); })
      .then(function (data) {
        showSelectedSection(selectedLabel, data.root_diffs, data.path_nodes);
      });
  });

  // Film sim filter — fetch new graph data without reloading the page.
  document.getElementById("film-sim-select").addEventListener("change", function () {
    var sim = this.value;
    var url = "/recipes/graph/?film_sim=" + encodeURIComponent(sim);
    history.pushState(null, "", url);
    fetch(url, { headers: { "Accept": "application/json" } })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        ROOT_ID = data.root_id;
        ROOT_LABEL = data.root_label || "";
        ROOT_FIELDS = data.root_fields || [];
        cy.elements().remove();
        cy.add(data.elements);
        applyNodeStyles(data.elements, ROOT_ID);
        cy.layout(makePresetLayout(buildRadialPositions(data.elements, ROOT_ID), applyRadialLabels)).run();
        populateRootCard(ROOT_LABEL, ROOT_FIELDS);
        hideSelectedSection();
        _pathEdges = [];
      });
  });

  // Restore correct dropdown value if user navigates back/forward.
  window.addEventListener("popstate", function () {
    var params = new URLSearchParams(window.location.search);
    var sim = params.get("film_sim") || ACTIVE_FILM_SIM;
    var select = document.getElementById("film-sim-select");
    if (select.value !== sim) {
      select.value = sim;
      select.dispatchEvent(new Event("change"));
    }
  });
</script>
</body>
</html>
