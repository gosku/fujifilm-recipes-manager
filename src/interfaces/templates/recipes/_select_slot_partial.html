<style>
  .slot-card-header {
    background: #1e1e1e;
    border-radius: 14px 14px 0 0;
    padding: 1.1rem 1.5rem;
    margin: -2rem -2rem 1.25rem -2rem;
    text-align: center;
    position: relative;
  }

  .slot-card-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 1.75rem;
    height: 1.75rem;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.65);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .slot-card-close:hover { background: rgba(255,255,255,0.2); }

  .slot-card .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0.3rem;
  }

  .slot-card .recipe-name {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
  }

  .slot-card .slot-row {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    width: 100%;
    padding: 0.8rem 0.5rem;
    border: none;
    border-bottom: 1px solid #f0f0f0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    transition: background 0.12s;
    border-radius: 6px;
  }

  .slot-card .slot-row:last-child { border-bottom: none; }

  .slot-card .slot-row:hover { background: #f6fdf9; }

  .slot-card .slot-badge {
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 6px;
    background: #222;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .slot-card .slot-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .slot-card .slot-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .slot-card .slot-film-tag {
    margin-top: 0.2rem;
    font-size: 0.68rem;
    font-weight: 500;
    color: #2db37a;
    background: #eaf7f0;
    border-radius: 3px;
    padding: 0.15rem 0.4rem;
    letter-spacing: 0.02em;
  }

  .slot-card .slot-chevron {
    color: #ccc;
    font-size: 1.2rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .slot-error {
    font-size: 0.9rem;
    color: #dc2626;
    padding: 1.25rem 0;
    text-align: center;
  }
</style>

<div id="slot-card" class="slot-card">
  <div class="slot-card-header">
    <button class="slot-card-close" onclick="closeSlotOverlay()" title="Close">&#x2715;</button>
    <p class="card-title">Push to camera</p>
    <p class="recipe-name">{{ recipe.name }}</p>
  </div>

  {% if error %}
    <p class="slot-error">{{ error }}</p>
  {% else %}
    {% for slot in slots %}
    <button type="button" class="slot-row"
            hx-post="{% url 'push-recipe-to-camera' recipe_id=recipe.id slot=slot.label %}"
            hx-target="#slot-card"
            hx-swap="innerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
      <span class="slot-badge">{{ slot.label }}</span>
      <span class="slot-info">
        <span class="slot-name">{{ slot.name|default:"—" }}</span>
        {% if slot.film_sim %}<span class="slot-film-tag">{{ slot.film_sim }}</span>{% endif %}
      </span>
      <span class="slot-chevron">›</span>
    </button>
    {% endfor %}
  {% endif %}
</div>
