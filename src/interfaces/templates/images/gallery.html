<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2/dist/js/tom-select.complete.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; font-family: sans-serif; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 280px;
      min-width: 280px;
      padding: 1.5rem;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      background: #fafafa;
    }

    .sidebar h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      margin-bottom: 1.2rem;
    }

    .filter-label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #444;
      margin-bottom: 0.35rem;
    }

    .filter-select {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      background: #fff;
      cursor: pointer;
    }

    /* Tune Tom Select to match sidebar width */
    .ts-wrapper { width: 100%; }
    .ts-control { font-size: 0.9rem; }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 2rem 1rem;
      flex-shrink: 0;
    }

    .gallery-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 2rem 2rem;
    }

    .gallery-header h1 {
      font-size: 1.5rem;
      color: #222;
    }

    .favorites-toggle {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: #555;
      user-select: none;
    }

    .favorites-toggle input[type="checkbox"] {
      appearance: none;
      width: 2rem;
      height: 1.1rem;
      background: #ccc;
      border-radius: 1rem;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .favorites-toggle input[type="checkbox"]:checked {
      background: #f97316;
    }

    .favorites-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 0.85rem;
      height: 0.85rem;
      background: #fff;
      border-radius: 50%;
      top: 0.125rem;
      left: 0.125rem;
      transition: left 0.2s;
    }

    .favorites-toggle input[type="checkbox"]:checked::after {
      left: calc(100% - 0.975rem);
    }

    #gallery-pagination {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #gallery-results { display: flex; flex-direction: column; gap: 1rem; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .pagination-btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .pagination-btn:hover { background: #f0f0f0; }

    .pagination-info { font-size: 0.85rem; color: #555; }

    .image-card {
      min-width: 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.5rem;
      background: #fff;
    }

    .image-thumbnail {
      width: auto;
      max-width: 100%;
      height: 300px;
      display: block;
      border-radius: 4px;
      margin: 0 auto 0.5rem;
      background: #f0f0f0;
    }

    .image-recipe {
      display: block;
      font-weight: 600;
      font-size: 1rem;
      color: #222;
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }

    .image-exposure {
      font-size: 0.9rem;
      color: #555;
    }

    .image-filename {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .recipe-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.3rem;
    }

    .recipe-label {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      white-space: nowrap;
    }

    .rl-dr   { background: #fef3c7; color: #92400e; }
    .rl-drp  { background: #ffedd5; color: #9a3412; }
    .rl-gr   { background: #ccfbf1; color: #134e4a; }
    .rl-gs   { background: #a7f3d0; color: #064e3b; }
    .rl-cce  { background: #ede9fe; color: #4c1d95; }
    .rl-ccfx { background: #e0e7ff; color: #312e81; }
    .rl-wb   { background: #bfdbfe; color: #1e3a8a; }
    .rl-r    { background: #fee2e2; color: #7f1d1d; }
    .rl-b    { background: #bae6fd; color: #0c4a6e; }
    .rl-hl   { background: #fef08a; color: #713f12; }
    .rl-sh   { background: #c7d2fe; color: #1e1b4b; }
    .rl-co   { background: #bbf7d0; color: #14532d; }
    .rl-srp  { background: #d9f99d; color: #365314; }
    .rl-ns   { background: #fbcfe8; color: #831843; }
    .rl-cl   { background: #e5e7eb; color: #1f2937; }

    .image-favorite {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #c8600a;
      background: #fff3e0;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
    }

    .no-results {
      grid-column: 1 / -1;
      color: #888;
      font-style: italic;
    }

    #detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      overflow: hidden;
    }

    #detail-overlay .detail-overlay {
      height: 100%;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <h2>Filters</h2>
  <form id="filter-form"
        hx-get="{% url 'gallery' %}"
        hx-trigger="change"
        hx-target="#gallery-results"
        hx-push-url="true">
    <div class="filter-group">
      <label class="favorites-toggle" for="favorites-first-toggle">
        <input type="checkbox" id="favorites-first-toggle">
        Favorites first
      </label>
      <input type="hidden" name="favorites_first" id="favorites-first-input" value="{{ favorites_first }}">
    </div>
    {% if recipe_options.options %}
      <div class="filter-group">
        <label class="filter-label" for="filter-recipe_id">{{ recipe_options.label }}</label>
        <select id="filter-recipe_id" name="recipe_id" class="filter-select filter-select-search">
          <option value="">All</option>
          {% for opt in recipe_options.options %}
            <option value="{{ opt.value }}"{% if recipe_options.selected == opt.value %} selected{% endif %}>{{ opt.label }}</option>
          {% endfor %}
        </select>
      </div>
    {% endif %}
        {% for field, opts in sidebar_options.items %}
      {% if opts.values %}
        <div class="filter-group">
          <label class="filter-label" for="filter-{{ field }}">{{ opts.label }}</label>
          <select id="filter-{{ field }}" name="{{ field }}"
                  class="filter-select{% if field == 'film_simulation' %} filter-select-search{% endif %}">
            <option value="">All</option>
            {% for value in opts.values %}
              <option value="{{ value }}"{% if opts.selected == value %} selected{% endif %}>{{ value }}</option>
            {% endfor %}
          </select>
        </div>
      {% endif %}
    {% endfor %}
  </form>
</aside>

<main class="main">
  <div class="gallery-header">
    <h1>Images</h1>
    {% include "images/_gallery_pagination.html" %}
  </div>
  <div class="gallery-scroll">
    <div id="gallery-results">
      {% include "images/_gallery_results.html" %}
    </div>
  </div>
</main>

<div id="detail-overlay" hidden></div>

<script>
  // Searchable dropdowns for recipe name and film simulation.
  // Tom Select hides the original <select>, so we relay its onChange
  // as a native change event on the form so HTMX picks it up.
  document.querySelectorAll('.filter-select-search').forEach(function (el) {
    new TomSelect(el, {
      create: false,
      onChange: function () {
        document.getElementById('filter-form').dispatchEvent(new Event('change'));
      },
    });
  });

  // Favorites-first toggle: persists in localStorage, syncs with URL param.
  (function () {
    var urlParams = new URLSearchParams(window.location.search);
    var hiddenInput = document.getElementById('favorites-first-input');
    var toggle = document.getElementById('favorites-first-toggle');

    var val;
    if (urlParams.has('favorites_first')) {
      val = urlParams.get('favorites_first');
    } else {
      val = localStorage.getItem('favoritesFirst') ?? '1';
      // Reflect current preference in the URL without a new history entry.
      urlParams.set('favorites_first', val);
      history.replaceState(null, '', '?' + urlParams.toString());
      // If server rendered with its default (1) but preference is off, re-fetch.
      if (val !== '1') {
        hiddenInput.value = val;
        document.getElementById('filter-form').dispatchEvent(new Event('change'));
      }
    }
    localStorage.setItem('favoritesFirst', val);
    hiddenInput.value = val;
    toggle.checked = (val === '1');

    toggle.addEventListener('change', function () {
      var newVal = toggle.checked ? '1' : '0';
      hiddenInput.value = newVal;
      localStorage.setItem('favoritesFirst', newVal);
      document.getElementById('filter-form').dispatchEvent(new Event('change'));
    });
  }());

  // Detail overlay logic.
  var _galleryUrl = null;

  function closeDetail() {
    document.getElementById('detail-overlay').hidden = true;
    document.querySelector('.gallery-scroll').style.overflow = '';
    if (_galleryUrl) {
      history.replaceState(null, '', _galleryUrl);
      _galleryUrl = null;
    }
  }

  window._detailClose = closeDetail;

  document.body.addEventListener('htmx:beforeRequest', function (e) {
    if (e.detail.target && e.detail.target.id === 'detail-overlay') {
      var overlay = document.getElementById('detail-overlay');
      if (overlay.hidden) _galleryUrl = window.location.href;
    }
  });

  var preloadedUrls = new Set();

  document.body.addEventListener('htmx:afterSwap', function (e) {
    if (e.detail.target.id !== 'detail-overlay') return;
    var overlay = e.detail.target;
    overlay.hidden = false;
    document.querySelector('.gallery-scroll').style.overflow = 'hidden';

    var img = overlay.querySelector('.detail-image');
    if (!img || !img.dataset.fullSrc) return;
    var fullSrc = img.dataset.fullSrc;

    function afterFullLoaded() {
      img.src = fullSrc;
      var nextUrl = overlay.querySelector('.detail-nav-next')?.dataset.preloadUrl;
      var prevUrl = overlay.querySelector('.detail-nav-prev')?.dataset.preloadUrl;
      if (nextUrl && !preloadedUrls.has(nextUrl)) {
        var n = new Image();
        n.onload = function () { preloadedUrls.add(nextUrl); };
        n.src = nextUrl;
      }
      if (prevUrl && !preloadedUrls.has(prevUrl)) {
        var p = new Image();
        p.onload = function () { preloadedUrls.add(prevUrl); };
        p.src = prevUrl;
      }
    }

    if (preloadedUrls.has(fullSrc)) {
      afterFullLoaded();
    } else {
      var full = new Image();
      full.onload = afterFullLoaded;
      full.src = fullSrc;
    }
  });

  document.addEventListener('keydown', function (e) {
    var overlay = document.getElementById('detail-overlay');
    if (!overlay || overlay.hidden) return;
    if (e.key === 'Escape') closeDetail();
    if (e.key === 'ArrowLeft') { var btn = overlay.querySelector('.detail-nav-prev'); if (btn) btn.click(); }
    if (e.key === 'ArrowRight') { var btn = overlay.querySelector('.detail-nav-next'); if (btn) btn.click(); }
  });
</script>
</body>
</html>
