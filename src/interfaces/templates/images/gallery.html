<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2/dist/js/tom-select.complete.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; font-family: sans-serif; min-height: 100vh; }

    .sidebar {
      width: 280px;
      min-width: 280px;
      padding: 1.5rem;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      background: #fafafa;
    }

    .sidebar h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      margin-bottom: 1.2rem;
    }

    .filter-label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #444;
      margin-bottom: 0.35rem;
    }

    .filter-select {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      background: #fff;
      cursor: pointer;
    }

    /* Tune Tom Select to match sidebar width */
    .ts-wrapper { width: 100%; }
    .ts-control { font-size: 0.9rem; }

    .main {
      flex: 1;
      min-width: 0;
      padding: 2rem;
      overflow-y: auto;
    }

    .main h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #222;
    }

    #gallery-results { display: flex; flex-direction: column; gap: 1rem; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-top: 0.5rem;
    }

    .pagination-btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .pagination-btn:hover { background: #f0f0f0; }

    .pagination-info { font-size: 0.85rem; color: #555; }

    .image-card {
      min-width: 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1rem;
      background: #fff;
    }

    .image-thumbnail {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      margin-bottom: 0.6rem;
      background: #f0f0f0;
    }

    .image-filename {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
      word-break: break-all;
    }

    .image-recipe {
      display: block;
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-exposure {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }

    .image-favorite {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #c8600a;
      background: #fff3e0;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
    }

    .no-results {
      grid-column: 1 / -1;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <h2>Filters</h2>
  <form id="filter-form"
        hx-get="{% url 'gallery-results' %}"
        hx-trigger="change"
        hx-target="#gallery-results">
    {% if recipe_options.options %}
      <div class="filter-group">
        <label class="filter-label" for="filter-recipe_id">{{ recipe_options.label }}</label>
        <select id="filter-recipe_id" name="recipe_id" class="filter-select filter-select-search">
          <option value="">All</option>
          {% for opt in recipe_options.options %}
            <option value="{{ opt.value }}"{% if recipe_options.selected == opt.value %} selected{% endif %}>{{ opt.label }}</option>
          {% endfor %}
        </select>
      </div>
    {% endif %}
        {% for field, opts in sidebar_options.items %}
      {% if opts.values %}
        <div class="filter-group">
          <label class="filter-label" for="filter-{{ field }}">{{ opts.label }}</label>
          <select id="filter-{{ field }}" name="{{ field }}"
                  class="filter-select{% if field == 'film_simulation' %} filter-select-search{% endif %}">
            <option value="">All</option>
            {% for value in opts.values %}
              <option value="{{ value }}"{% if opts.selected == value %} selected{% endif %}>{{ value }}</option>
            {% endfor %}
          </select>
        </div>
      {% endif %}
    {% endfor %}
  </form>
</aside>

<main class="main">
  <h1>Images</h1>
  <div id="gallery-results">
    {% include "images/_gallery_results.html" %}
  </div>
</main>

<script>
  // Searchable dropdowns for recipe name and film simulation.
  // Tom Select hides the original <select>, so we relay its onChange
  // as a native change event on the form so HTMX picks it up.
  document.querySelectorAll('.filter-select-search').forEach(function (el) {
    new TomSelect(el, {
      create: false,
      onChange: function () {
        document.getElementById('filter-form').dispatchEvent(new Event('change'));
      },
    });
  });
</script>
</body>
</html>
